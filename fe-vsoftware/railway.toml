[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[build.args]
NEXT_PUBLIC_SITE_NAME = "ViAI"
# NEXT_PUBLIC_API_URL và NEXT_PUBLIC_SITE_URL set trong Railway Dashboard → Variables
# vì chúng phụ thuộc vào URL Railway tự sinh ra

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/"
